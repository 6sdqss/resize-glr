/* ===== IMAGE ENGINE: Resize thật bằng Canvas API ===== */
const Engine={
  load(file){
    return new Promise((ok,no)=>{
      const r=new FileReader();
      r.onload=e=>{const img=new Image();img.onload=()=>ok(img);img.onerror=()=>no(new Error("Bad image"));img.src=e.target.result};
      r.onerror=()=>no(new Error("Read error"));
      r.readAsDataURL(file);
    });
  },
  resize(img,tw,th,q=0.95){
    return new Promise(ok=>{
      const c=document.createElement('canvas'),x=c.getContext('2d');
      if(!tw||!th){c.width=img.width;c.height=img.height;x.fillStyle='#fff';x.fillRect(0,0,c.width,c.height);x.drawImage(img,0,0)}
      else{
        c.width=tw;c.height=th;x.fillStyle='#fff';x.fillRect(0,0,tw,th);
        const ir=img.width/img.height,tr=tw/th;
        let nw,nh;if(ir>tr){nw=tw;nh=Math.round(tw/ir)}else{nh=th;nw=Math.round(th*ir)}
        x.drawImage(img,Math.round((tw-nw)/2),Math.round((th-nh)/2),nw,nh);
      }
      c.toBlob(b=>ok(b),'image/jpeg',q);
    });
  },
  async process(file,tw,th,q){
    const img=await this.load(file);
    const blob=await this.resize(img,tw,th,q);
    return{name:file.name.replace(/\.[^.]+$/,'.jpg'),blob,origSize:file.size,newSize:blob.size};
  },
  async extractZip(file){
    const zip=await JSZip.loadAsync(file);
    const out=[];
    const exts=['.jpg','.jpeg','.png','.webp','.bmp'];
    zip.forEach((path,entry)=>{
      if(entry.dir)return;
      const l=path.toLowerCase();
      if(l.includes('__macosx')||l.includes('.ds_store')||l.startsWith('._'))return;
      if(exts.some(e=>l.endsWith(e)))out.push({path,entry});
    });
    return out;
  },
  async makeZip(results){
    const z=new JSZip();
    for(const r of results)z.file(r.name,r.blob);
    return z.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
  },
  download(blob,name){saveAs(blob,name)}
};

function getWH(preset,cw,ch){
  if(preset==="custom")return{w:parseInt(cw)||1000,h:parseInt(ch)||1000};

  if(!p||preset==="original")return{w:null,h:null};
  return{w:p.w,h:p.h};
}

/* ===== MAIN TAB: UPLOAD & RESIZE (100% working) ===== */
function MainTab(props){
  const[files,setFiles]=useState([]);
  const[previews,setPreviews]=useState([]);
  const[busy,setBusy]=useState(false);
  const[prog,setProg]=useState(0);
  const[cur,setCur]=useState("");
  const[zipBlob,setZipBlob]=useState(null);
  const[stats,setStats]=useState(null);
  const[drag,setDrag]=useState(false);
  const[logs,setLogs]=useState([]);
  const ref=useRef(null);
  const cancel=useRef(false);

  const log=(m,t="info")=>setLogs(p=>[...p,{m,t,time:new Date().toLocaleTimeString('vi-VN')}]);

  const addFiles=(fl)=>{
    const ok=Array.from(fl).filter(f=>/\.(jpg|jpeg|png|webp|zip)$/i.test(f.name));
    setFiles(p=>[...p,...ok]);
    ok.forEach(f=>{if(/\.(jpg|jpeg|png|webp)$/i.test(f.name)){const r=new FileReader();r.onload=e=>setPreviews(p=>[...p,{name:f.name,src:e.target.result}]);r.readAsDataURL(f)}});
  };

  const run=async()=>{
    cancel.current=false;setBusy(true);setProg(0);setZipBlob(null);setStats(null);setLogs([]);
    const{w,h}=getWH(props.preset,props.cw,props.ch);
    const q=props.quality/100;
    log("🚀 Bắt đầu — "+files.length+" file — "+(w?w+"×"+h:"Giữ nguyên")+" — Q"+props.quality);

    let all=[];
    // Extract all images
    for(const f of files){
      if(cancel.current)break;
      if(/\.zip$/i.test(f.name)){
        log("📦 Giải nén "+f.name+"...");
        try{
          const entries=await Engine.extractZip(f);
          log("   → "+entries.length+" ảnh trong ZIP","success");
          for(const e of entries){const data=await e.entry.async('arraybuffer');all.push({name:e.path.split('/').pop(),data})}
        }catch(e){log("❌ Lỗi giải nén: "+e.message,"error")}
      } else all.push({name:f.name,file:f});
    }
    log("📊 Tổng: "+all.length+" ảnh cần xử lý");

    let results=[],totO=0,totN=0,errs=0;
    for(let i=0;i<all.length;i++){
      if(cancel.current){log("🚫 Đã hủy","warn");break}
      setCur(all[i].name);setProg((i+1)/all.length);
      try{
        let res;
        if(all[i].file)res=await Engine.process(all[i].file,w,h,q);
        else{const blob=new Blob([all[i].data]);const file=new File([blob],all[i].name);res=await Engine.process(file,w,h,q)}
        results.push(res);totO+=res.origSize;totN+=res.newSize;
      }catch(e){errs++;log("⚠️ "+all[i].name+": "+e.message,"error")}
    }

    if(results.length>0&&!cancel.current){
      log("📦 Đang nén ZIP...");setCur("Tạo file ZIP...");
      const zip=await Engine.makeZip(results);
      setZipBlob(zip);
      const saved=totO-totN;
      setStats({n:results.length,errs,origSize:totO,newSize:totN,saved,pct:totO>0?Math.round(saved/totO*100):0,zipSize:zip.size});
      log("✅ Hoàn tất! "+results.length+" ảnh — Tiết kiệm "+fmtS(saved)+" ("+Math.round(saved/totO*100)+"%)","success");
    } else if(!results.length) log("❌ Không có ảnh nào thành công","error");

    setBusy(false);setCur("");
  };

  const dl=()=>{if(zipBlob){const{w,h}=getWH(props.preset,props.cw,props.ch);Engine.download(zipBlob,(w?"Resized_"+w+"x"+h:"Original")+"_"+Date.now()+".zip");log("📥 Đã tải ZIP!","success")}};
  const clear=()=>{setFiles([]);setPreviews([]);setZipBlob(null);setStats(null);setLogs([]);setProg(0)};

  return React.createElement('div',null,
    React.createElement(RC,props),
    // Dropzone
    React.createElement('div',{onDragOver:e=>{e.preventDefault();setDrag(true)},onDragLeave:()=>setDrag(false),onDrop:e=>{e.preventDefault();setDrag(false);addFiles(e.dataTransfer.files)},onClick:()=>ref.current&&ref.current.click(),style:{border:"2px dashed "+(drag?"#3b82f6":"rgba(255,255,255,0.1)"),borderRadius:16,padding:"40px 24px",textAlign:"center",cursor:"pointer",background:drag?"rgba(59,130,246,0.05)":"rgba(255,255,255,0.01)",marginBottom:20,transition:"all .3s"}},
      React.createElement('input',{ref,type:"file",multiple:true,accept:".jpg,.jpeg,.png,.webp,.zip",onChange:e=>addFiles(e.target.files),style:{display:"none"}}),
      React.createElement('div',{style:{width:52,height:52,borderRadius:14,margin:"0 auto 14px",background:"rgba(59,130,246,0.08)",display:"flex",alignItems:"center",justifyContent:"center",color:"#60a5fa"}},React.createElement(I,{n:"upload",s:26})),
      React.createElement('div',{style:{color:"#fff",fontSize:15,fontWeight:600,marginBottom:5}},"Kéo thả ảnh hoặc file ZIP vào đây"),
      React.createElement('div',{style:{color:"rgba(255,255,255,0.3)",fontSize:13}},"JPG, PNG, WebP, ZIP — Không giới hạn"),
    ),
    // File list
    files.length>0&&React.createElement('div',{style:{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,marginBottom:20,overflow:"hidden"}},
      React.createElement('div',{style:{padding:"10px 18px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center"}},
        React.createElement('span',{style:{color:"rgba(255,255,255,0.5)",fontSize:13}},files.length+" file · "+fmtS(files.reduce((a,f)=>a+f.size,0))),
